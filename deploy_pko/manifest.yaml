apiVersion: manifests.package-operator.run/v1alpha1
kind: PackageManifest
metadata:
  name: pagerduty-operator
spec:
  scopes:
  - Cluster
  phases:
  - name: crds
  - name: namespace
  - name: rbac
  - name: deploy
  - name: integrations
  - name: cleanup-rbac
  - name: cleanup-deploy
  availabilityProbes:
  - probes:
    - condition:
        type: Available
        status: 'True'
    - fieldsEqual:
        fieldA: .status.updatedReplicas
        fieldB: .status.replicas
    selector:
      kind:
        group: apps
        kind: Deployment
  config:
    openAPIV3Schema:
      type: object
      properties:
        image:
          description: Operator image to deploy
          type: string
          default: ""
        fedramp:
          description: FedRAMP mode flag
          type: string
          default: "false"
        acknowledgeTimeout:
          description: PagerDuty incident acknowledge timeout in seconds
          type: integer
          default: 21600
        resolveTimeout:
          description: PagerDuty incident resolve timeout in seconds
          type: integer
          default: 0
        escalationPolicy:
          description: PagerDuty escalation policy ID for standard alerts
          type: string
        escalationPolicySilent:
          description: PagerDuty escalation policy ID for silent alerts
          type: string
        servicePrefix:
          description: Prefix for PagerDuty service names
          type: string
        silentAlertLegalEntityIds:
          description: Legal entity IDs routed to silent escalation policy
          type: array
          items:
            type: string
          default: []
        scaleTestEscalationPolicy:
          description: PagerDuty escalation policy ID for scale test alerts
          type: string
        scaleTestServicePrefix:
          description: Prefix for scale test PagerDuty service names
          type: string
        scaleTestLegalEntityIds:
          description: Legal entity IDs for scale test organizations
          type: array
          items:
            type: string
          default: []
        serviceOrchestrationEnabled:
          description: Enable PagerDuty service orchestration
          type: string
          default: "false"
        serviceOrchestrationRuleConfigmap:
          description: ConfigMap name containing service orchestration rules
          type: string
          default: "osd-serviceorchestration"
        alertGroupingType:
          description: PagerDuty alert grouping type
          type: string
          default: ""
        alertGroupingTimeout:
          description: PagerDuty alert grouping timeout in minutes
          type: integer
          default: 0
        serviceOrchestrationRules:
          description: JSON rules for PagerDuty service orchestration
          type: string
          default: "{}"
        rhInfraServiceOrchestrationRules:
          description: JSON rules for RH infra PagerDuty service orchestration
          type: string
          default: "{}"
test:
  template:
  - name: default
    context:
      package:
        metadata:
          name: pagerduty-operator
          namespace: pagerduty-operator
      config:
        image: quay.io/example/pagerduty-operator:test
        fedramp: "false"
        acknowledgeTimeout: 21600
        resolveTimeout: 0
        escalationPolicy: PTEST123
        escalationPolicySilent: PSILENT1
        servicePrefix: osd
        silentAlertLegalEntityIds:
        - "1aV37K1VQv2zSStwSkdwBNOUBGI"
        - "2Mo8exhgEA5ir1lsVypXUb9v902"
        scaleTestEscalationPolicy: PSCALE01
        scaleTestServicePrefix: osd-scale-test
        scaleTestLegalEntityIds:
        - "1ep4WsPDKikDQCFLsi2yKdzH8xB"
        serviceOrchestrationEnabled: "true"
        serviceOrchestrationRuleConfigmap: osd-serviceorchestration
        alertGroupingType: time
        alertGroupingTimeout: 300
        serviceOrchestrationRules: '{"orchestration_path":{"catch_all":{"actions":{}},"sets":[{"id":"start","rules":[{"actions":{"suppress":true},"conditions":[{"expression":"event.severity matches ''Warning''"}]}]}],"type":"service"}}'
        rhInfraServiceOrchestrationRules: '{"orchestration_path":{"catch_all":{"actions":{}},"sets":[{"id":"start","rules":[{"actions":{"suppress":true},"conditions":[{"expression":"event.severity matches ''Warning''"}]},{"actions":{"priority":"PDPJP5Q"},"conditions":[]}]}],"type":"service"}}'
  - name: integration
    context:
      package:
        metadata:
          name: pagerduty-operator
          namespace: pagerduty-operator
      config:
        image: quay.io/example/pagerduty-operator:test
        fedramp: "false"
        acknowledgeTimeout: 21600
        resolveTimeout: 0
        escalationPolicy: PA2GM5L
        escalationPolicySilent: PNCPMTV
        servicePrefix: osdint
        silentAlertLegalEntityIds: []
        scaleTestEscalationPolicy: PKCHC7O
        scaleTestServicePrefix: osd-scale-test
        scaleTestLegalEntityIds:
        - "1ep4WsPDKikDQCFLsi2yKdzH8xB"
        serviceOrchestrationEnabled: "true"
        serviceOrchestrationRuleConfigmap: osd-serviceorchestration
        alertGroupingType: ""
        alertGroupingTimeout: 0
        serviceOrchestrationRules: '{"orchestration_path":{"catch_all":{"actions":{}},"sets":[{"id":"start","rules":[{"actions":{"suppress":true},"conditions":[{"expression":"event.severity matches ''Warning''"}]}]}],"type":"service"}}'
        rhInfraServiceOrchestrationRules: '{"orchestration_path":{"catch_all":{"actions":{}},"sets":[{"id":"start","rules":[{"actions":{"suppress":true},"conditions":[{"expression":"event.severity matches ''Warning''"}]},{"actions":{"priority":"PDPJP5Q"},"conditions":[]}]}],"type":"service"}}'
  - name: empty-arrays
    context:
      package:
        metadata:
          name: pagerduty-operator
          namespace: pagerduty-operator
      config:
        image: quay.io/example/pagerduty-operator:test
        fedramp: "false"
        acknowledgeTimeout: 21600
        resolveTimeout: 0
        escalationPolicy: PTEST123
        escalationPolicySilent: PSILENT1
        servicePrefix: osd
        silentAlertLegalEntityIds: []
        scaleTestEscalationPolicy: PSCALE01
        scaleTestServicePrefix: osd-scale-test
        scaleTestLegalEntityIds: []
        serviceOrchestrationEnabled: "true"
        serviceOrchestrationRuleConfigmap: osd-serviceorchestration
        alertGroupingType: ""
        alertGroupingTimeout: 0
        serviceOrchestrationRules: "{}"
        rhInfraServiceOrchestrationRules: "{}"
  - name: fedramp
    context:
      package:
        metadata:
          name: pagerduty-operator
          namespace: pagerduty-operator
      config:
        image: quay.io/example/pagerduty-operator:test
        fedramp: "true"
        acknowledgeTimeout: 21600
        resolveTimeout: 0
        escalationPolicy: PTEST123
        escalationPolicySilent: PSILENT1
        servicePrefix: osd
        silentAlertLegalEntityIds: []
        scaleTestEscalationPolicy: PSCALE01
        scaleTestServicePrefix: osd-scale-test
        scaleTestLegalEntityIds: []
        serviceOrchestrationEnabled: "false"
        serviceOrchestrationRuleConfigmap: osd-serviceorchestration
        alertGroupingType: ""
        alertGroupingTimeout: 0
        serviceOrchestrationRules: "{}"
        rhInfraServiceOrchestrationRules: "{}"
  - name: orchestration-disabled
    context:
      package:
        metadata:
          name: pagerduty-operator
          namespace: pagerduty-operator
      config:
        image: quay.io/example/pagerduty-operator:test
        fedramp: "false"
        acknowledgeTimeout: 21600
        resolveTimeout: 0
        escalationPolicy: PTEST123
        escalationPolicySilent: PSILENT1
        servicePrefix: osd
        silentAlertLegalEntityIds:
        - "1aV37K1VQv2zSStwSkdwBNOUBGI"
        scaleTestEscalationPolicy: PSCALE01
        scaleTestServicePrefix: osd-scale-test
        scaleTestLegalEntityIds:
        - "1ep4WsPDKikDQCFLsi2yKdzH8xB"
        serviceOrchestrationEnabled: "false"
        serviceOrchestrationRuleConfigmap: osd-serviceorchestration
        alertGroupingType: ""
        alertGroupingTimeout: 0
        serviceOrchestrationRules: "{}"
        rhInfraServiceOrchestrationRules: "{}"
